
backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "settings"
    label: "Genel Ayarlar"
    files:
      - file: "public/content/settings.json"
        label: "Site Ayarları"
        name: "site_settings"
        fields:
          - { label: "Site Logosu", name: "logo", widget: "image" }
          - { label: "Adres", name: "address", widget: "string", required: false }
          - { label: "E-posta", name: "email", widget: "string", required: false }
          - { label: "Telefon", name: "phone", widget: "string", required: false }
          - label: "Sosyal Medya Hesapları"
            name: "socialMedia"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Facebook URL", name: "facebook", widget: "string", required: false }
              - { label: "Twitter (X) URL", name: "twitter", widget: "string", required: false }
              - { label: "Instagram URL", name: "instagram", widget: "string", required: false }
              - { label: "YouTube URL", name: "youtube", widget: "string", required: false }
          - { label: "Bakım Modu", name: "maintenanceMode", widget: "boolean", default: false }
          - label: "Navigasyon Menüsü"
            name: "navigation"
            widget: "list"
            summary: "{{name}}"
            fields:
              - { label: "Menü Adı", name: "name", widget: "string" }
              - { label: "Link (Opsiyonel)", name: "path", widget: "string", required: false }
              - { label: "Menüde Görünsün mü?", name: "visible", widget: "boolean", default: true }
              - { label: "Açılır Menü mü?", name: "isDropdown", widget: "boolean", default: false, required: false }
              - label: "Alt Menü Öğeleri"
                name: "items"
                widget: "list"
                required: false
                fields:
                  - { label: "Alt Menü Adı", name: "name", widget: "string" }
                  - { label: "Alt Menü Linki (Opsiyonel)", name: "path", widget: "string", required: false }
                  - { label: "Açılır Menü mü?", name: "isDropdown", widget: "boolean", default: false, required: false }
                  - label: "Alt-Alt Menü Öğeleri"
                    name: "items"
                    widget: "list"
                    required: false
                    fields:
                      - { label: "Adı", name: "name", widget: "string" }
                      - { label: "Linki", name: "path", widget: "string" }
          - label: "Global Stiller"
            name: "globalStyles"
            widget: "object"
            fields:
              - { label: "Yazı Tipi (Font Family)", name: "fontFamily", widget: "string", default: "'Inter', sans-serif" }
              - { label: "Temel Yazı Boyutu", name: "baseFontSize", widget: "string", default: "16px" }
              - { label: "Birincil Renk (Primary Color)", name: "primaryColor", widget: "color", default: "#267d87" }
              - { label: "İkincil Renk (Secondary Color)", name: "secondaryColor", widget: "color", default: "#f97316" }

  - name: "homepage"
    label: "Ana Sayfa İçeriği"
    files:
      - file: "public/content/homepage.json"
        label: "Ana Sayfa Ayarları"
        name: "homepage_hero"
        fields:
          - { label: "Arkaplan Fotoğrafı", name: "heroImage", widget: "image" }
          - { label: "Ana Başlık", name: "heroTitle", widget: "string" }
          - { label: "Alt Başlık", name: "heroSubtitle", widget: "string" }
          - label: "Bölüm Kontrolleri"
            name: "sections"
            widget: "list"
            fields:
              - { label: "Bölüm ID", name: "id", widget: "hidden" }
              - { label: "Bölüm Adı", name: "name", widget: "string" }
              - { label: "Görünür mü?", name: "visible", widget: "boolean" }
              - { label: "Sıralama", name: "order", widget: "number" }
  
  - name: "teams"
    label: "Takımlar"
    files:
      - file: "public/content/teams.json"
        label: "Takımlar"
        name: "teams_collection"
        fields:
          - name: "teams"
            label: "Takım Listesi"
            widget: "list"
            summary: "{{name}}"
            fields:
              - { name: "name", label: "Takım Adı", widget: "string", required: true }
              - { name: "slug", label: "Takım Linki (Örn: u-13)", widget: "string", required: true, hint: "Adres çubuğunda görünecek kimlik. Sadece küçük harf, rakam ve tire kullanın." }
              - { name: "heroImage", label: "Kapak Fotoğrafı", widget: "image" }
              - name: "coach"
                label: "Teknik Kadro"
                widget: "object"
                fields:
                  - { name: "name", label: "İsim", widget: "string", required: true }
                  - { name: "role", label: "Görev", widget: "string", required: true }
                  - { name: "imageUrl", label: "Fotoğraf", widget: "image", required: false }
              - name: "players"
                label: "Oyuncular"
                widget: "list"
                summary: "{{name}} - #{{number}}"
                fields:
                  - { name: "name", label: "İsim", widget: "string", required: true }
                  - { name: "position", label: "Pozisyon", widget: "string", required: true }
                  - { name: "number", label: "Numara", widget: "number", required: true }
                  - { name: "imageUrl", label: "Fotoğraf", widget: "image", required: true }

  - name: "branches"
    label: "Branşlarımız"
    files:
      - file: "public/content/branches.json"
        label: "Branşlar"
        name: "branches_collection"
        fields:
          - name: "branches"
            label: "Branş Listesi"
            widget: "list"
            summary: "{{name}}"
            fields:
              - { name: "name", label: "Branş Adı", widget: "string", required: true }
              - { name: "slug", label: "Branş Linki (Örn: tenis)", widget: "string", required: true, hint: "Adres çubuğunda görünecek kimlik. Sadece küçük harf, rakam ve tire kullanın." }
              - { name: "heroImage", label: "Kapak Fotoğrafı", widget: "image" }
              - { name: "description", label: "Branş Açıklaması", widget: "text" }
              - { name: "content", label: "Haberler ve Duyurular", widget: "markdown", required: false }
              - name: "coach"
                label: "Teknik Kadro"
                widget: "object"
                required: false
                fields:
                  - { name: "name", label: "İsim", widget: "string", required: true }
                  - { name: "role", label: "Görev", widget: "string", required: true }
                  - { name: "imageUrl", label: "Fotoğraf", widget: "image", required: false }
              - name: "players"
                label: "Sporcular"
                widget: "list"
                required: false
                summary: "{{name}} - #{{number}}"
                fields:
                  - { name: "name", label: "İsim", widget: "string", required: true }
                  - { name: "position", label: "Pozisyon", widget: "string", required: true }
                  - { name: "number", label: "Numara", widget: "number", required: true }
                  - { name: "imageUrl", label: "Fotoğraf", widget: "image", required: true }

  - name: "fixtures"
    label: "Fikstür ve Sonuçlar"
    files:
      - file: "public/content/fixtures.json"
        label: "Maç Fikstürleri"
        name: "fixture_data"
        fields:
          - name: "fixtures"
            label: "Fikstür Listesi"
            widget: "list"
            summary: "{{teamName}} Fikstürü"
            fields:
              - { name: "teamName", label: "Takım Adı", widget: "string" }
              - { name: "teamSlug", label: "İlgili Takım Linki (örn: u-11)", widget: "string", required: true, hint: "Bu fikstürün hangi takıma ait olduğunu belirtir. Takımlar listesindeki 'Takım Linki' ile aynı olmalıdır." }
              - name: "matches"
                label: "Maçlar"
                widget: "list"
                summary: "{{date}} vs {{opponent}}"
                fields:
                  - { name: "date", label: "Tarih", widget: "string", required: true }
                  - { name: "opponent", label: "Rakip", widget: "string", required: true }
                  - { name: "score", label: "Skor", widget: "string", default: "-", hint: "Maç oynanmadıysa '-' olarak bırakın." }
                  - name: "location"
                    label: "Konum"
                    widget: "select"
                    options: ["Ev", "Deplasman"]

  - name: "news"
    label: "Haberler"
    files:
      - file: "public/content/newsData.json"
        label: "Haberler ve Duyurular"
        name: "news_articles"
        fields:
          - name: "articles"
            label: "Haberler"
            widget: "list"
            summary: "{{title}}"
            fields:
              - { name: "title", label: "Başlık", widget: "string", required: true }
              - { name: "summary", label: "Özet", widget: "text", required: true }
              - { name: "content", label: "İçerik", widget: "markdown", required: false }
              - { name: "date", label: "Yayın Tarihi", widget: "date", format: "DD.MM.YYYY", required: true }
              - { name: "imageUrl", label: "Kapak Fotoğrafı", widget: "image", required: true }

  - name: "gallery"
    label: "Galeri"
    files:
      - file: "public/content/galleryData.json"
        label: "Fotoğraf Galerisi"
        name: "gallery_images"
        fields:
          - name: "images"
            label: "Fotoğraflar"
            widget: "list"
            summary: "{{title | default: 'Başlıksız Fotoğraf'}}"
            fields:
              - { name: "imageUrl", label: "Fotoğraf", widget: "image", required: true }
              - { name: "title", label: "Başlık (Opsiyonel)", widget: "string", required: false }

  - name: "staff"
    label: "Yönetim"
    files:
      - file: "public/content/staffData.json"
        label: "Yönetim ve Teknik Ekip"
        name: "staff_members"
        fields:
          - name: "members"
            label: "Ekip Üyeleri"
            widget: "list"
            summary: "{{name}} - {{role}}"
            fields:
              - { name: "name", label: "İsim", widget: "string", required: true }
              - { name: "role", label: "Görev", widget: "string", required: true }
              - { name: "imageUrl", label: "Fotoğraf", widget: "image", required: true }
  
  - name: "about"
    label: "Hakkımızda İçeriği"
    files:
      - file: "public/content/missionVision.json"
        label: "Misyon & Vizyon"
        name: "mission_vision"
        fields:
          - { name: "mission", label: "Misyonumuz", widget: "text" }
          - { name: "vision", label: "Vizyonumuz", widget: "text" }
